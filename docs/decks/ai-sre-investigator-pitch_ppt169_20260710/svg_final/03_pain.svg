    <path d="M1 1V15H15V13H3V1H1Z" />
    <path d="M5 7L7 5L10 8L15 3V11H5V7Z" />
  </g>
      <text x="44" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#0F2A44">MTTR 居高不下，故障影响时长被放大</text>
    </g>
    <g transform="translate(688,424)">
      
  <g transform="translate(0.0, 0.0) scale(1.75)" fill="#5A6B7E">
    <path d="M8 3.5C8 4.88071 6.88071 6 5.5 6C4.11929 6 3 4.88071 3 3.5C3 2.11929 4.11929 1 5.5 1C6.88071 1 8 2.11929 8 3.5Z" />
