<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

  
  <rect x="56" y="48" width="6" height="32" fill="#C62828" />
  <text x="74" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828" letter-spacing="2">03 · 痛点</text>
  <text x="56" y="118" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="37" font-weight="bold" fill="#0F2A44">可观测性 QL 认知壁垒 × "多对一"人力灾难</text>
  <text x="56" y="156" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#5A6B7E">PRD §2 三大痛点：QL 学习曲线陡、组织挤兑少数 SRE、RCA 沉淀缺失</text>

  
  <g id="today-col">
    <path fill="#F4F6FA" stroke="#E2E8F0" d="M62,200 H610 A6,6 0 0 1 616,206 V574 A6,6 0 0 1 610,580 H62 A6,6 0 0 1 56,574 V206 A6,6 0 0 1 62,200 Z" />
    <text x="80" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E" letter-spacing="2">今天</text>
    <text x="80" y="276" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F2A44">开发的处境</text>

    
    <g transform="translate(80,308)">
      <path fill="#C62828" fill-opacity="0.12" d="M4,0 H32 A4,4 0 0 1 36,4 V32 A4,4 0 0 1 32,36 H4 A4,4 0 0 1 0,32 V4 A4,4 0 0 1 4,0 Z" />
      <text x="18" y="24" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C62828" text-anchor="middle">1</text>
      <text x="56" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">QL 认知壁垒高</text>
      <text x="56" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">PromQL / LogQL / TraceQL 语法陡峭，</text>
      <text x="56" y="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">依赖 SRE 预设面板排查；深层问题无从下手</text>
    </g>

    
    <g transform="translate(80,402)">
      <path fill="#C62828" fill-opacity="0.12" d="M4,0 H32 A4,4 0 0 1 36,4 V32 A4,4 0 0 1 32,36 H4 A4,4 0 0 1 0,32 V4 A4,4 0 0 1 4,0 Z" />
      <text x="18" y="24" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C62828" text-anchor="middle">2</text>
      <text x="56" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">"多对一"挤兑</text>
      <text x="56" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">全公司向极少数 SRE 求助，</text>
      <text x="56" y="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">SRE 疲于充当"查日志客服"</text>
    </g>

    
    <g transform="translate(80,496)">
      <path fill="#C62828" fill-opacity="0.12" d="M4,0 H32 A4,4 0 0 1 36,4 V32 A4,4 0 0 1 32,36 H4 A4,4 0 0 1 0,32 V4 A4,4 0 0 1 4,0 Z" />
      <text x="18" y="24" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C62828" text-anchor="middle">3</text>
      <text x="56" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">RCA 沉淀缺失</text>
      <text x="56" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">跨系统排查靠肌肉记忆，事后 RCA</text>
      <text x="56" y="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">繁琐耗时，MTTR 居高不下</text>
    </g>
  </g>

  
  <g id="cost-col">
    <path fill="#FFFFFF" stroke="#C62828" stroke-width="1.4" d="M670,200 H1218 A6,6 0 0 1 1224,206 V574 A6,6 0 0 1 1218,580 H670 A6,6 0 0 1 664,574 V206 A6,6 0 0 1 670,200 Z" />
