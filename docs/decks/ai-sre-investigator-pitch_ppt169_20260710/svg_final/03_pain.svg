  </g>
      <text x="44" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#0F2A44">SRE 长期过载，On-call 团队流失加剧</text>
    </g>
    <g transform="translate(688,468)">
      
  <g transform="translate(0.0, 0.0) scale(1.75)" fill="#5A6B7E">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM7 3V8.41421L10.2929 11.7071L11.7071 10.2929L9 7.58579V3H7Z" />
  </g>
      <text x="44" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#0F2A44">故障复盘缺乏统一证据链，组织无法学习</text>
    </g>
    <g transform="translate(688,512)">
      
  <g transform="translate(0.0, 0.0) scale(1.75)" fill="#5A6B7E">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M4 6V4C4 1.79086 5.79086 0 8 0C10.2091 0 12 1.79086 12 4V6H14V16H2V6H4ZM6 4C6 2.89543 6.89543 2 8 2C9.10457 2 10 2.89543 10 4V6H6V4ZM7 13V9H9V13H7Z" />
  </g>
      <text x="44" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#0F2A44">处置类能力被锁死：信任未建立，无人敢开写权限</text>
    </g>
  </g>

  
  <g id="chevron-bridge">
