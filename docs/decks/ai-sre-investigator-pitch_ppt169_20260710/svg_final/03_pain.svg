    <text x="316" y="646" font-family="Consolas, Courier New, monospace" font-size="22" fill="#00A6A6">→</text>
    <text x="356" y="646" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#0F2A44">自动 QL</text>
    <text x="464" y="646" font-family="Consolas, Courier New, monospace" font-size="22" fill="#00A6A6">→</text>
    <text x="504" y="646" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#0F2A44">多步证据链</text>
    <text x="652" y="646" font-family="Consolas, Courier New, monospace" font-size="22" fill="#00A6A6">→</text>
    <text x="692" y="646" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#0F2A44">结构化 RCA</text>
    <text x="892" y="646" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#5A6B7E">· 一次排查产生的 RCA 同时是组织级资产</text>
  </g>

  
