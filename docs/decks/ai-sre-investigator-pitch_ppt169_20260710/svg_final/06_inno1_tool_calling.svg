<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

  
  <rect x="56" y="48" width="6" height="32" fill="#00A6A6" />
  <text x="74" y="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="2">06 · 核心创新 ①</text>
  <text x="56" y="118" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="37" font-weight="bold" fill="#0F2A44">原生 Tool-Calling 闭环</text>
  <text x="56" y="156" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#5A6B7E">拒绝 LangChain 等抽象框架 · 用 openai SDK 的 tool_calls 自实现"接 prompt → 调度 tool → 结果回灌"循环（ADR-001）</text>

  
  <g id="chain">
    
    <g transform="translate(60,220)">
      <path fill="#F4F6FA" stroke="#00A6A6" stroke-width="1.4" d="M8,0 H252 A8,8 0 0 1 260,8 V192 A8,8 0 0 1 252,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
      
  <g transform="translate(24.0, 24.0) scale(2.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M9 0V2H13L16 8.5L13 15H3L0 8.5L3 2H7V0H9ZM4.59794 11.7384L8 12.2618L11.4021 11.7384L11.0979 9.76163L8 10.2382L4.90206 9.76163L4.59794 11.7384ZM7 6.75C7 7.44036 6.44036 8 5.75 8C5.05964 8 4.5 7.44036 4.5 6.75C4.5 6.05964 5.05964 5.5 5.75 5.5C6.44036 5.5 7 6.05964 7 6.75ZM10.25 8C10.9404 8 11.5 7.44036 11.5 6.75C11.5 6.05964 10.9404 5.5 10.25 5.5C9.55964 5.5 9 6.05964 9 6.75C9 7.44036 9.55964 8 10.25 8Z" />
  </g>
      <text x="24" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="2">STEP 1</text>
      <text x="24" y="130" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">自然语言输入</text>
      <text x="24" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">"payment-service 刚才</text>
      <text x="24" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">为什么大量 500？"</text>
    </g>

    
    <g>
      <line x1="328" y1="320" x2="354" y2="320" stroke="#0F2A44" stroke-width="2" />
      <polygon points="362,320 352,314 352,326" fill="#0F2A44" />
    </g>

    
    <g transform="translate(370,220)">
      <path fill="#F4F6FA" stroke="#00A6A6" stroke-width="1.4" d="M8,0 H252 A8,8 0 0 1 260,8 V192 A8,8 0 0 1 252,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
      
  <g transform="translate(24.0, 24.0) scale(2.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M15 1H1V15H15V1ZM6 5L7.41421 6.41421L5.82843 8L7.41421 9.58579L6 11L3 8L6 5ZM10 5L8.58579 6.41421L10.1716 8L8.58579 9.58579L10 11L13 8L10 5Z" />
  </g>
      <text x="24" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="2">STEP 2</text>
      <text x="24" y="130" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">Tool Schema → LLM</text>
      <text x="24" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">把 Pydantic 严谨参数</text>
      <text x="24" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">转成 LLM tools 列表</text>
    </g>

    
    <g>
      <line x1="638" y1="320" x2="664" y2="320" stroke="#0F2A44" stroke-width="2" />
      <polygon points="672,320 662,314 662,326" fill="#0F2A44" />
    </g>

    
    <g transform="translate(680,220)">
      <path fill="#F4F6FA" stroke="#00A6A6" stroke-width="1.4" d="M8,0 H252 A8,8 0 0 1 260,8 V192 A8,8 0 0 1 252,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
      
  <g transform="translate(24.0, 24.0) scale(2.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M6.50001 0H9.50001L10.0939 2.37548C10.7276 2.6115 11.3107 2.95155 11.8223 3.37488L14.1782 2.70096L15.6782 5.29904L13.9173 7.00166C13.9717 7.32634 14 7.65987 14 8C14 8.34013 13.9717 8.67366 13.9173 8.99834L15.6782 10.701L14.1782 13.299L11.8223 12.6251C11.3107 13.0484 10.7276 13.3885 10.0939 13.6245L9.50001 16H6.50001L5.90614 13.6245C5.27242 13.3885 4.68934 13.0484 4.17768 12.6251L1.82181 13.299L0.321808 10.701L2.08269 8.99834C2.02831 8.67366 2.00001 8.34013 2.00001 8C2.00001 7.65987 2.02831 7.32634 2.08269 7.00166L0.321808 5.29904L1.82181 2.70096L4.17768 3.37488C4.68934 2.95155 5.27241 2.6115 5.90614 2.37548L6.50001 0ZM8.00001 10C9.10458 10 10 9.10457 10 8C10 6.89543 9.10458 6 8.00001 6C6.89544 6 6.00001 6.89543 6.00001 8C6.00001 9.10457 6.89544 10 8.00001 10Z" />
  </g>
      <text x="24" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="2">STEP 3</text>
      <text x="24" y="130" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F2A44">解析 tool_calls</text>
      <text x="24" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">本地执行工具函数，</text>
      <text x="24" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">结果拼回上下文再次请求</text>
    </g>

    
    <g>
      <line x1="948" y1="320" x2="974" y2="320" stroke="#0F2A44" stroke-width="2" />
      <polygon points="982,320 972,314 972,326" fill="#0F2A44" />
    </g>

    
    <g transform="translate(990,220)">
      <path fill="#0F2A44" d="M8,0 H222 A8,8 0 0 1 230,8 V192 A8,8 0 0 1 222,200 H8 A8,8 0 0 1 0,192 V8 A8,8 0 0 1 8,0 Z" />
      
  <g transform="translate(24.0, 24.0) scale(2.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM12.7071 5.70711L11.2929 4.29289L6.5 9.08579L4.70711 7.29289L3.29289 8.70711L6.5 11.9142L12.7071 5.70711Z" />
  </g>
      <text x="24" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="2">STEP 4</text>
      <text x="24" y="130" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">停止调用</text>
      <text x="24" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#A8C0DA">LLM 不再发起 tool_call</text>
      <text x="24" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#A8C0DA">→ 生成结构化 RCA</text>
    </g>

    
    <path d="M 810 200 Q 810 178 660 178 Q 510 178 510 200" fill="none" stroke="#00A6A6" stroke-width="1.4" stroke-dasharray="6 4" />
    <text x="660" y="172" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#00A6A6" text-anchor="middle">结果回灌，循环直到 LLM 停止调用</text>
  </g>

  
  <g id="judgment">
    <path fill="#F4F6FA" stroke="#E2E8F0" d="M68,460 H1212 A8,8 0 0 1 1220,468 V612 A8,8 0 0 1 1212,620 H68 A8,8 0 0 1 60,612 V468 A8,8 0 0 1 68,460 Z" />
    <text x="80" y="494" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F2A44" letter-spacing="2">为什么是"原生"而非"框架"</text>
    <line x1="80" y1="504" x2="240" y2="504" stroke="#00A6A6" stroke-width="2" />

    <g transform="translate(80,520)">
      
  <g transform="translate(0.0, 0.0) scale(1.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM12.7071 5.70711L11.2929 4.29289L6.5 9.08579L4.70711 7.29289L3.29289 8.70711L6.5 11.9142L12.7071 5.70711Z" />
  </g>
      <text x="36" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#0F2A44">推理流可见、可约束、可调试</text>
      <text x="36" y="40" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">SRE 场景对每一步推理的可见性是刚需，框架抽象层会引入黑盒</text>
    </g>

    <g transform="translate(440,520)">
      
  <g transform="translate(0.0, 0.0) scale(1.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM12.7071 5.70711L11.2929 4.29289L6.5 9.08579L4.70711 7.29289L3.29289 8.70711L6.5 11.9142L12.7071 5.70711Z" />
  </g>
      <text x="36" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#0F2A44">执行效率最优</text>
      <text x="36" y="40" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">排查是多步长链路，框架抽象层会引入不可控延迟与开销</text>
    </g>

    <g transform="translate(800,520)">
      
  <g transform="translate(0.0, 0.0) scale(1.5)" fill="#00A6A6">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM12.7071 5.70711L11.2929 4.29289L6.5 9.08579L4.70711 7.29289L3.29289 8.70711L6.5 11.9142L12.7071 5.70711Z" />
  </g>
      <text x="36" y="18" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#0F2A44">为 MCP / GOAP 演进铺路</text>
      <text x="36" y="40" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#5A6B7E">ToolSpec 契约对齐 MCP schema，未来替换 transport 不动业务逻辑</text>
    </g>
  </g>

  <line x1="56" y1="676" x2="1224" y2="676" stroke="#E2E8F0" />
  <text x="56" y="700" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#8896A6">ADR-001 · PRD §4 / §7</text>
  <text x="1224" y="700" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#8896A6" text-anchor="end">P06 / 12</text>
