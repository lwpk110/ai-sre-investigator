<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgDecor" cx="82%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#00A6A6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00A6A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ruleFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A6A6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00A6A6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00A6A6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="consoleGrid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- dark surface background -->
  <rect x="0" y="0" width="1280" height="720" fill="#0F2A44"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#consoleGrid)"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgDecor)"/>

  <!-- top waveform decoration -->
  <g id="top-wave">
    <path d="M 0 70 Q 80 50 160 70 T 320 70 T 480 70 T 640 70 T 800 70 T 960 70 T 1120 70 T 1280 70" fill="none" stroke="#00A6A6" stroke-width="1.4" stroke-opacity="0.55"/>
    <path d="M 0 90 Q 80 76 160 90 T 320 90 T 480 90 T 640 90 T 800 90 T 960 90 T 1120 90 T 1280 90" fill="none" stroke="#4A6FA5" stroke-width="1" stroke-opacity="0.45"/>
    <path d="M 0 110 Q 80 100 160 110 T 320 110 T 480 110 T 640 110 T 800 110 T 960 110 T 1120 110 T 1280 110" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.25"/>
  </g>

  <!-- left side accent block (motif #5: console panel) -->
  <g id="left-accent">
    <rect x="80" y="200" width="6" height="240" fill="#00A6A6"/>
    <rect x="80" y="200" width="6" height="240" fill="url(#ruleFade)"/>
  </g>

  <!-- small caps label -->
  <text x="110" y="220" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00A6A6" letter-spacing="3">MVP V1.0 · 立项评审</text>

  <!-- hero title -->
  <text x="110" y="320" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="70" font-weight="bold" fill="#FFFFFF">AI SRE Investigator</text>

  <!-- subtitle -->
  <text x="112" y="378" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="600" fill="#A8C0DA">自然语言驱动的可观测性 RCA 助手</text>

  <!-- one-line value -->
  <text x="112" y="430" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" fill="#A8C0DA">让开发用"大白话"调动 Mimir / Loki / Tempo，自动生成结构化根因报告</text>

  <!-- bottom lockup strip -->
  <g id="bottom-strip">
    <rect x="80" y="560" width="1120" height="1" fill="#4A6FA5" fill-opacity="0.4"/>
    <text x="80" y="610" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#8896A6">项目自有术语</text>

    <g id="mlt-chips">
      <rect x="180" y="592" width="100" height="32" rx="4" fill="#FFFFFF" fill-opacity="0.06" stroke="#00A6A6" stroke-opacity="0.6"/>
      <text x="230" y="613" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Mimir</text>

      <rect x="296" y="592" width="100" height="32" rx="4" fill="#FFFFFF" fill-opacity="0.06" stroke="#00A6A6" stroke-opacity="0.6"/>
      <text x="346" y="613" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Loki</text>

      <rect x="412" y="592" width="100" height="32" rx="4" fill="#FFFFFF" fill-opacity="0.06" stroke="#00A6A6" stroke-opacity="0.6"/>
      <text x="462" y="613" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Tempo</text>
    </g>

    <text x="1200" y="613" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#8896A6" text-anchor="end">2026-07-10 · 内部评审</text>
  </g>

  <!-- right-side schematic motif: console panel with signal trace -->
  <g id="right-console">
    <rect x="820" y="200" width="380" height="240" rx="8" fill="#FFFFFF" fill-opacity="0.04" stroke="#00A6A6" stroke-opacity="0.4" stroke-width="1.4"/>
    <text x="848" y="232" font-family="Consolas, Courier New, monospace" font-size="12" fill="#00A6A6">$ investigate payment-service</text>

    <!-- signal bars -->
    <g id="bars" transform="translate(848,260)">
      <rect x="0" y="20" width="20" height="40" fill="#00A6A6" fill-opacity="0.85"/>
      <rect x="32" y="10" width="20" height="50" fill="#00A6A6" fill-opacity="0.7"/>
      <rect x="64" y="30" width="20" height="30" fill="#00A6A6" fill-opacity="0.5"/>
      <rect x="96" y="5" width="20" height="55" fill="#00A6A6" fill-opacity="0.9"/>
      <rect x="128" y="22" width="20" height="38" fill="#00A6A6" fill-opacity="0.6"/>
      <rect x="160" y="14" width="20" height="46" fill="#00A6A6" fill-opacity="0.7"/>
      <rect x="192" y="28" width="20" height="32" fill="#00A6A6" fill-opacity="0.55"/>
      <rect x="224" y="8" width="20" height="52" fill="#00A6A6" fill-opacity="0.8"/>
      <rect x="256" y="18" width="20" height="42" fill="#00A6A6" fill-opacity="0.65"/>
      <rect x="288" y="0" width="20" height="60" fill="#00A6A6" fill-opacity="0.95"/>
    </g>

    <!-- waveform trace -->
    <path d="M 848 410 L 880 410 L 895 380 L 910 430 L 925 360 L 945 415 L 970 410 L 990 380 L 1010 410 L 1030 410 L 1050 370 L 1075 410 L 1100 410 L 1120 360 L 1145 415 L 1170 410" fill="none" stroke="#00A6A6" stroke-width="2" stroke-linejoin="round"/>

    <text x="848" y="430" font-family="Consolas, Courier New, monospace" font-size="11" fill="#A8C0DA">error_rate peak @ 14:23:17 · 5xx burst · trace_id 8f3a…</text>
  </g>

  <!-- footer -->
  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#5A6B7E">内部立项评审 · 资料来源：PRD / 6 个 ADR / tech-design-ql-selfheal / brainstorm-ideas</text>
</svg>
